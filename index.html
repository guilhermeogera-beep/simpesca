<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Simulador de Pesca">
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Simulador de Pesca</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a1628; --bg2:#0f2040; --bg3:#162a50; --accent:#00b4d8; --accent2:#0077b6;
      --gold:#f4a261; --green:#2dc653; --red:#e63946; --yellow:#ffd166; --purple:#9b5de5;
      --text:#e8f4fd; --muted:#7b9bb8; --card:rgba(255,255,255,0.05); --border:rgba(0,180,216,0.2);
      --shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,119,182,0.3) 0%, transparent 70%),
                  radial-gradient(ellipse 60% 40% at 80% 100%, rgba(0,180,216,0.15) 0%, transparent 60%);
      pointer-events: none; }
    .modal-redirect { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 1000;
      align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .modal-redirect.show { display: flex; }
    .modal-content { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 24px;
      text-align: center; max-width: 300px; box-shadow: var(--shadow); }
    .modal-icon { font-size: 48px; margin-bottom: 12px; }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); margin-bottom: 8px; letter-spacing: 2px; }
    .modal-text { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .modal-btn { background: linear-gradient(135deg, var(--accent2), var(--accent)); border: none; color: white;
      padding: 12px 24px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 8px; transition: all 0.2s; }
    .modal-btn:hover { transform: scale(1.05); }
  </style>
</head>
<body>

<!-- MODAL DE REDIRECIONAMENTO (aparece se desconectar do ESP32) -->
<div class="modal-redirect" id="modalRedirect">
  <div class="modal-content">
    <div class="modal-icon">🌐</div>
    <div class="modal-title">Modo Offline Detectado</div>
    <div class="modal-text" id="modalText">Você está desconectado do ESP32. Deseja acessar a versão online?</div>
    <button class="modal-btn" onclick="irParaOnline()">Sim, ir online</button>
    <button class="modal-btn" style="background:var(--card); color:var(--text);" onclick="fecharModal()">Aguardar conexão</button>
  </div>
</div>

<!-- SEU HTML ORIGINAL CONTINUA AQUI -->
<!-- (cole o resto do seu index.html a partir daqui) -->

<script>
// ════════════════════════════════════════════════════════════
// DETECÇÃO INTELIGENTE DE MODO ONLINE/OFFLINE
// ════════════════════════════════════════════════════════════

const BASE_URL_GITHUB = 'https://guilhermeogera-beep.github.io/SImulador-de-pesca';
const BASE_URL_OFFLINE = 'http://192.168.4.1';
let modoAtual = 'github'; // 'github' ou 'esp32'
let tentativasConexao = 0;

// Detecta o modo inicial
function detectarModo() {
  const hostname = window.location.hostname;
  const ehLocalhost = hostname === '192.168.4.1' || hostname === 'localhost' || hostname === '127.0.0.1';
  
  if (ehLocalhost) {
    modoAtual = 'esp32';
    console.log('✓ Modo ESP32 (offline)');
  } else {
    modoAtual = 'github';
    console.log('✓ Modo GitHub (online)');
  }
  
  monitorarConexao();
}

// Monitora a conexão com o ESP32
function monitorarConexao() {
  setInterval(() => {
    // Se está no modo GitHub, tenta conectar ao ESP32 a cada 5s
    if (modoAtual === 'github') {
      fetch('http://192.168.4.1/getStatus', { signal: AbortSignal.timeout(1000) })
        .then(r => r.json())
        .then(() => {
          // ESP32 conectado! Oferece opção de mudar para modo offline
          console.log('✓ ESP32 detectado');
          mostrarModalRedirect();
        })
        .catch(() => {
          // ESP32 não disponível
          tentativasConexao = 0;
        });
    }
  }, 5000);
}

function mostrarModalRedirect() {
  if (tentativasConexao === 0) {
    tentativasConexao++;
    document.getElementById('modalRedirect').classList.add('show');
  }
}

function irParaOnline() {
  window.location.href = BASE_URL_GITHUB;
}

function irParaOffline() {
  window.location.href = BASE_URL_OFFLINE;
}

function fecharModal() {
  document.getElementById('modalRedirect').classList.remove('show');
}

// Inicia detecção ao carregar
window.addEventListener('load', detectarModo);

// Se estiver no modo ESP32, registra o service worker inteligente
if ('serviceWorker' in navigator && window.location.hostname === '192.168.4.1') {
  navigator.serviceWorker.register('service-worker.js').catch(e => console.warn('SW não disponível:', e));
}
</script>

</body>
</html>

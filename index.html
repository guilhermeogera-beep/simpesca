<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <base href="/simpesca/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Pesca - PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#0077b6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121b29;
            color: #E0E0E0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 300;
            color: #00b4d8;
            letter-spacing: 3px;
            margin: 0 0 8px 0;
            font-size: 24px;
        }
        .subtitulo {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .instrucao {
            background: #1a2636;
            border: 1px solid #2a3b54;
            border-radius: 12px;
            padding: 15px 20px;
            font-size: 13px;
            color: #aaa;
            max-width: 320px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .instrucao span {
            color: #00b4d8;
            font-weight: bold;
        }
        .btn {
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 14px;
            width: 85%;
            max-width: 320px;
            margin-bottom: 15px;
            letter-spacing: 1px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        #btnInstalar {
            background: #27ae60;
            color: white;
            display: none;
            box-shadow: 0 4px 20px rgba(39,174,96,0.4);
        }
        #btnConectar {
            background: #00b4d8;
            color: #121212;
            box-shadow: 0 4px 20px rgba(0,180,216,0.3);
        }
        .status {
            font-size: 12px;
            color: #555;
            margin-top: 20px;
        }
        .status.ok { color: #27ae60; }
    </style>
</head>
<body>

    <img src="icons/icon-192.png" class="logo" alt="Logo SimPesca">
    <h1>SIMULADOR DE PESCA</h1>
    <p class="subtitulo">Painel de Controle e Telemetria</p>

    <div class="instrucao">
        <strong>Como usar:</strong><br>
        1. <span>Instale</span> o app no seu smartphone<br>
        2. Conecte-se na mesma rede Wi-Fi do simulador<br>
        3. Clique abaixo para abrir o painel do hardware.
    </div>

    <button id="btnInstalar" class="btn">📥 Instalar Simulador</button>
    <button id="btnConectar" class="btn" onclick="conectarSimulador()">🔌 Abrir Painel do ESP</button>

    <p class="status" id="statusSW">Carregando...</p>

    <script>
        // Mude aqui se o ESP32 do simulador de pesca usar outro IP!
        const ESP_IP = "http://192.168.4.1";

        function conectarSimulador() {
            window.location.href = ESP_IP + "/";
        }

        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('btnInstalar').style.display = 'block';
        });

        document.getElementById('btnInstalar').addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('btnInstalar').style.display = 'none';
            }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            document.getElementById('btnInstalar').style.display = 'none';
            deferredPrompt = null;
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => {
                    document.getElementById('statusSW').textContent = '✅ Simulador pronto para uso offline';
                    document.getElementById('statusSW').className = 'status ok';
                })
                .catch(() => {
                    document.getElementById('statusSW').textContent = '⚠️ Erro ao registrar service worker';
                });
        }
    </script>
</body>
</html>

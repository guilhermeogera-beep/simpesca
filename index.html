<base href="/simpesca/">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#0077b6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
    #btnInstalar {
        display: none; /* Só aparece se o navegador permitir a instalação */
        position: fixed;
        top: 15px;
        right: 15px;
        background: #27ae60;
        color: white;
        border: none;
        padding: 10px 20px;
        font-weight: bold;
        border-radius: 20px;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 4px 15px rgba(39,174,96,0.4);
    }
</style>

<button id="btnInstalar">📥 Instalar Jogo</button>

<script>
    // Lógica de instalação do PWA
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Mostra o botão de instalação na tela do jogo
        document.getElementById('btnInstalar').style.display = 'block';
    });

    document.getElementById('btnInstalar').addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            document.getElementById('btnInstalar').style.display = 'none';
        }
        deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
        document.getElementById('btnInstalar').style.display = 'none';
        deferredPrompt = null;
    });

    // Registra o Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✅ Simulador pronto para uso offline!', reg.scope))
                .catch(err => console.log('⚠️ Erro ao registrar SW:', err));
        });
    }
</script>
